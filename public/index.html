<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>地球スピナー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 50% 38%, #0c1830 0%, #060a16 65%, #03050c 100%);
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  #canvas.grabbing { cursor: grabbing; }
  #hud {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: #cfe0ff; pointer-events: none; text-align: center;
  }
  #rpm { font-size: 30px; font-weight: 600; letter-spacing: 0.5px; font-variant-numeric: tabular-nums; }
  #rpm small { font-size: 13px; font-weight: 400; opacity: 0.6; margin-left: 4px; }
  #barWrap { width: 180px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.10); overflow: hidden; }
  #bar { height: 100%; width: 0%; border-radius: 3px;
         background: linear-gradient(90deg, #4a7cff, #7fd0ff); }

  /* 左上の操作パネル */
  #panel {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 7px;
    padding: 10px; width: 210px;
    background: rgba(14,22,40,0.55); border: 1px solid rgba(120,160,255,0.18);
    border-radius: 10px; backdrop-filter: blur(6px);
    opacity: 0.55; transition: opacity 0.2s;
  }
  #panel:hover, #panel:focus-within { opacity: 1; }
  #panel .row { display: flex; gap: 6px; }
  #panel input[type=text] {
    flex: 1; min-width: 0; padding: 6px 8px; font-size: 12px;
    background: rgba(0,0,0,0.35); color: #dbe6ff;
    border: 1px solid rgba(120,160,255,0.25); border-radius: 6px;
  }
  #panel button, #panel label.btn {
    padding: 6px 8px; font-size: 12px; cursor: pointer; white-space: nowrap;
    color: #dbe6ff; background: rgba(70,110,200,0.30);
    border: 1px solid rgba(120,160,255,0.30); border-radius: 6px;
    text-align: center;
  }
  #panel button:hover, #panel label.btn:hover { background: rgba(90,140,240,0.45); }
  #panel label.btn { display: block; }
  #panel input[type=file] { display: none; }
  #msg { font-size: 11px; min-height: 14px; color: #ffd0d0; }
  #hint { position: fixed; bottom: 18px; left: 0; right: 0; text-align: center;
          color: rgba(200,215,255,0.35); font-size: 13px; pointer-events: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="panel">
  <div class="row">
    <input id="urlInput" type="text" placeholder="地球画像のURL"
      value="https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg">
    <button id="urlBtn">読込</button>
  </div>
  <div class="row">
    <label class="btn" style="flex:1">画像を選択<input id="fileInput" type="file" accept="image/*"></label>
    <button id="genBtn" style="flex:1">自動生成に戻す</button>
  </div>
  <div id="msg"></div>
</div>

<div id="hud">
  <div id="rpm">0<small>RPM</small></div>
  <div id="barWrap"><div id="bar"></div></div>
</div>
<div id="hint">ドラッグして回す・同じ方向に繰り返すと加速</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const rpmEl = document.getElementById("rpm");
  const barEl = document.getElementById("bar");
  const msgEl = document.getElementById("msg");

  // ==========================================================
  // テクスチャ（可変サイズ / RGB）
  // ==========================================================
  let TW = 640, TH = 320;
  let tex = new Uint8ClampedArray(TW * TH * 3);

  function mix(a, b, t) { return a + (b - a) * t; }

  // ---- 手続き的な地球テクスチャ（3Dノイズ・完全オフライン） ----
  function hash3(i, j, k) {
    let n = Math.imul(i, 374761393) + Math.imul(j, 668265263) + Math.imul(k, 1274126177);
    n = (n ^ (n >>> 13)) >>> 0;
    n = Math.imul(n, 1274126177) >>> 0;
    n = (n ^ (n >>> 16)) >>> 0;
    return n / 4294967295;
  }
  function smooth(t) { return t * t * (3 - 2 * t); }
  function vnoise(x, y, z) {
    const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
    const xf = x - xi, yf = y - yi, zf = z - zi;
    const u = smooth(xf), v = smooth(yf), w = smooth(zf);
    const c000 = hash3(xi,yi,zi),     c100 = hash3(xi+1,yi,zi);
    const c010 = hash3(xi,yi+1,zi),   c110 = hash3(xi+1,yi+1,zi);
    const c001 = hash3(xi,yi,zi+1),   c101 = hash3(xi+1,yi,zi+1);
    const c011 = hash3(xi,yi+1,zi+1), c111 = hash3(xi+1,yi+1,zi+1);
    const x00 = c000+(c100-c000)*u, x10 = c010+(c110-c010)*u;
    const x01 = c001+(c101-c001)*u, x11 = c011+(c111-c011)*u;
    const y0 = x00+(x10-x00)*v, y1 = x01+(x11-x01)*v;
    return y0 + (y1 - y0) * w;
  }
  function fbm(x, y, z, oct) {
    let sum = 0, amp = 1, freq = 1, norm = 0;
    for (let o = 0; o < oct; o++) { sum += amp*vnoise(x*freq,y*freq,z*freq); norm += amp; amp *= 0.5; freq *= 2; }
    return sum / norm;
  }
  function buildProceduralTexture() {
    TW = 640; TH = 320;
    const nt = new Uint8ClampedArray(TW * TH * 3);
    const SEA = 0.48;
    for (let ty = 0; ty < TH; ty++) {
      const lat = (0.5 - ty / TH) * Math.PI;
      const cl = Math.cos(lat), sl = Math.sin(lat), absLat = Math.abs(lat);
      for (let tx = 0; tx < TW; tx++) {
        const lon = (tx / TW - 0.5) * Math.PI * 2;
        const dx = cl*Math.sin(lon), dy = sl, dz = cl*Math.cos(lon);
        const e = fbm(dx*1.8+11.3, dy*1.8+4.7,  dz*1.8+19.1, 5);
        const m = fbm(dx*2.6-7.2,  dy*2.6+21.5, dz*2.6-3.4,  4);
        const c = fbm(dx*3.1+40.0, dy*3.1-15.0, dz*3.1+8.0,  4);
        let r, g, b;
        if (e < SEA) {
          const d = (SEA - e) / SEA;
          r = mix(28,8,d); g = mix(96,30,d); b = mix(150,70,d);
        } else {
          const h = (e - SEA) / (1 - SEA);
          if (h < 0.045) { r=208; g=190; b=140; }
          else {
            const wet = smooth(Math.max(0, Math.min(1, (m-0.35)/0.28)));
            r = mix(196,46,wet); g = mix(174,112,wet); b = mix(104,44,wet);
            if (h > 0.5) { const t = Math.min(1,(h-0.5)/0.4); r=mix(r,120,t); g=mix(g,104,t); b=mix(b,92,t); }
            if (h > 0.78){ const t = Math.min(1,(h-0.78)/0.18); r=mix(r,236,t); g=mix(g,238,t); b=mix(b,242,t); }
          }
        }
        const ice = smooth(Math.max(0, Math.min(1, (absLat-1.24)/0.22)));
        r = mix(r,240,ice); g = mix(g,245,ice); b = mix(b,250,ice);
        const cloud = smooth(Math.max(0, Math.min(1, (c-0.56)/0.16))) * 0.9;
        r = mix(r,250,cloud); g = mix(g,250,cloud); b = mix(b,252,cloud);
        const idx = (ty*TW+tx)*3;
        nt[idx]=r; nt[idx+1]=g; nt[idx+2]=b;
      }
    }
    tex = nt;
    setMsg("");
  }
  buildProceduralTexture();

  // ---- 画像からテクスチャを取り込む（正距円筒 2:1 前提） ----
  function setTextureFromImage(img) {
    const w = img.naturalWidth || img.width;
    if (!w) { setMsg("画像サイズを取得できません"); return; }
    let tw = Math.min(2048, w); tw = tw & ~1; if (tw < 2) tw = 640;
    let th = tw >> 1;
    const tc = document.createElement("canvas"); tc.width = tw; tc.height = th;
    const tcx = tc.getContext("2d");
    tcx.drawImage(img, 0, 0, tw, th);
    let data;
    try { data = tcx.getImageData(0, 0, tw, th).data; }
    catch (err) { setMsg("CORS制限で読み込めません（別画像/アップロードを試してください）"); return; }
    const nt = new Uint8ClampedArray(tw * th * 3);
    for (let i = 0, j = 0; i < data.length; i += 4, j += 3) { nt[j]=data[i]; nt[j+1]=data[i+1]; nt[j+2]=data[i+2]; }
    TW = tw; TH = th; tex = nt;
    setMsg("");
  }
  function loadFromURL(url) {
    if (!url) return;
    setMsg("読み込み中…");
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => setTextureFromImage(img);
    img.onerror = () => setMsg("URLの読み込みに失敗（CORS未対応か無効なURL）");
    img.src = url;
  }
  function loadFromFile(file) {
    if (!file) return;
    setMsg("読み込み中…");
    const reader = new FileReader();
    reader.onload = (e) => { const img = new Image(); img.onload = () => setTextureFromImage(img); img.onerror = () => setMsg("画像を解釈できません"); img.src = e.target.result; };
    reader.onerror = () => setMsg("ファイル読み込み失敗");
    reader.readAsDataURL(file);
  }
  function setMsg(s) { msgEl.textContent = s; }

  document.getElementById("urlBtn").addEventListener("click", () => loadFromURL(document.getElementById("urlInput").value.trim()));
  document.getElementById("fileInput").addEventListener("change", (e) => loadFromFile(e.target.files[0]));
  document.getElementById("genBtn").addEventListener("click", buildProceduralTexture);

  // ==========================================================
  // Canvas / スフィアバッファ
  // ==========================================================
  let cw = 0, ch = 0, cx = 0, cy = 0, R = 0, dpr = 1;
  const sphereCanvas = document.createElement("canvas");
  const sphereCtx = sphereCanvas.getContext("2d");
  let DIAM = 0, imgData = null, buf = null;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cw = window.innerWidth; ch = window.innerHeight;
    canvas.width = Math.round(cw * dpr); canvas.height = Math.round(ch * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = cw / 2; cy = ch / 2;
    R = Math.min(cw, ch) * 0.36;
    DIAM = Math.max(64, Math.min(Math.round(2 * R), 400));
    sphereCanvas.width = DIAM; sphereCanvas.height = DIAM;
    imgData = sphereCtx.createImageData(DIAM, DIAM);
    buf = imgData.data;
  }
  window.addEventListener("resize", resize);
  resize();

  // ==========================================================
  // クォータニオン
  // ==========================================================
  function qMul(a, b) {
    const aw=a[0],ax=a[1],ay=a[2],az=a[3], bw=b[0],bx=b[1],by=b[2],bz=b[3];
    return [aw*bw-ax*bx-ay*by-az*bz, aw*bx+ax*bw+ay*bz-az*by,
            aw*by-ax*bz+ay*bw+az*bx, aw*bz+ax*by-ay*bx+az*bw];
  }
  function qNorm(q) { const l = Math.hypot(q[0],q[1],q[2],q[3]) || 1; return [q[0]/l,q[1]/l,q[2]/l,q[3]/l]; }
  function qFromAxisAngle(ax, ay, az, angle) {
    const len = Math.hypot(ax, ay, az);
    if (len < 1e-9 || angle === 0) return [1,0,0,0];
    const s = Math.sin(angle/2) / len;
    return [Math.cos(angle/2), ax*s, ay*s, az*s];
  }
  function qToMatrix(q) {
    const w=q[0],x=q[1],y=q[2],z=q[3];
    const xx=x*x,yy=y*y,zz=z*z,xy=x*y,xz=x*z,yz=y*z,wx=w*x,wy=w*y,wz=w*z;
    return [1-2*(yy+zz),2*(xy-wz),2*(xz+wy), 2*(xy+wz),1-2*(xx+zz),2*(yz-wx), 2*(xz-wy),2*(yz+wx),1-2*(xx+yy)];
  }
  let orientation = qNorm([1, 0.06, 0.12, 0]);

  // ==========================================================
  // レンダリング
  // ==========================================================
  const INV2PI = 1 / (Math.PI*2), INVPI = 1 / Math.PI;
  const Ll = Math.hypot(-0.45, 0.55, 0.85);
  const Lx = -0.45/Ll, Ly = 0.55/Ll, Lz = 0.85/Ll;
  const AMB = 0.30;
  let glow = 0;   // 0..1（速度連動の発光量）

  function renderGlobe() {
    const m = qToMatrix(orientation);
    const m0=m[0],m1=m[1],m2=m[2],m3=m[3],m4=m[4],m5=m[5],m6=m[6],m7=m[7],m8=m[8];
    const half = DIAM/2, inv = 1/half;
    const edgeStart = 1 - 3/DIAM, edgeW = 3/DIAM;
    const bright = 1 + 0.35 * glow;   // 高速時は表面もわずかに増光

    for (let py = 0; py < DIAM; py++) {
      const ny = (half - (py + 0.5)) * inv, ny2 = ny*ny;
      let idx = py * DIAM * 4;
      for (let px = 0; px < DIAM; px++, idx += 4) {
        const nx = (px + 0.5 - half) * inv;
        const d2 = nx*nx + ny2;
        if (d2 > 1) { buf[idx+3] = 0; continue; }
        const nz = Math.sqrt(1 - d2);
        const mx = m0*nx + m3*ny + m6*nz;
        const my = m1*nx + m4*ny + m7*nz;
        const mz = m2*nx + m5*ny + m8*nz;
        const lon = Math.atan2(mx, mz);
        const lat = Math.asin(my > 1 ? 1 : my < -1 ? -1 : my);
        const u = ((lon * INV2PI) + 0.5) * TW;
        const v = (0.5 - lat * INVPI) * TH;
        let tx = u | 0, tyy = v | 0;
        tx = ((tx % TW) + TW) % TW;
        if (tyy < 0) tyy = 0; else if (tyy >= TH) tyy = TH - 1;
        const ti = (tyy * TW + tx) * 3;
        let diff = nx*Lx + ny*Ly + nz*Lz; if (diff < 0) diff = 0;
        const shade = (AMB + (1 - AMB) * diff) * bright;
        const r = Math.sqrt(d2);
        let a = 255; if (r > edgeStart) a = (1 - (r - edgeStart) / edgeW) * 255;
        buf[idx]   = tex[ti]   * shade;
        buf[idx+1] = tex[ti+1] * shade;
        buf[idx+2] = tex[ti+2] * shade;
        buf[idx+3] = a < 0 ? 0 : a;
      }
    }
    sphereCtx.putImageData(imgData, 0, 0);

    ctx.clearRect(0, 0, cw, ch);
    // 背後の大気ハロー（速度で拡大・増光）
    const haloR = R * (1.14 + 0.28 * glow);
    const atmo = ctx.createRadialGradient(cx, cy, R * 0.9, cx, cy, haloR);
    atmo.addColorStop(0, "rgba(110,170,255," + (0.32 + 0.5*glow).toFixed(3) + ")");
    atmo.addColorStop(1, "rgba(110,170,255,0)");
    ctx.beginPath(); ctx.arc(cx, cy, haloR, 0, Math.PI*2);
    ctx.fillStyle = atmo; ctx.fill();

    // 地球本体
    ctx.drawImage(sphereCanvas, cx - R, cy - R, 2*R, 2*R);

    // 発光エフェクト（加算合成）
    if (glow > 0.01) {
      ctx.globalCompositeOperation = "lighter";
      const core = ctx.createRadialGradient(cx, cy, R*0.15, cx, cy, R*1.3);
      core.addColorStop(0, "rgba(150,200,255," + (0.22*glow).toFixed(3) + ")");
      core.addColorStop(0.55, "rgba(110,170,255," + (0.16*glow).toFixed(3) + ")");
      core.addColorStop(1, "rgba(110,170,255,0)");
      ctx.beginPath(); ctx.arc(cx, cy, R*1.3, 0, Math.PI*2);
      ctx.fillStyle = core; ctx.fill();
      // 縁のブライトリム
      ctx.lineWidth = 1.5 + 5 * glow;
      ctx.strokeStyle = "rgba(210,235,255," + (0.55*glow).toFixed(3) + ")";
      ctx.beginPath(); ctx.arc(cx, cy, R * 1.004, 0, Math.PI*2); ctx.stroke();
      ctx.globalCompositeOperation = "source-over";
    }
  }

  // ==========================================================
  // 操作 ＋ 慣性（同方向で加速）
  // ==========================================================
  const ROT_PER_PX = 0.006;
  const FRICTION = 0.988;
  const STOP_THRESHOLD = 0.0004;
  const MAX_SPEED = 0.45;      // rad/frame（加速の上限）
  const CARRY = 0.9;           // 離す前の勢いをどれだけ引き継ぐか
  const FLICK_MIN = 0.006;     // これ未満のフリックは「掴んで止めた」とみなし慣性を引き継がない
  const MAX_RPM = MAX_SPEED * 3600 / (2 * Math.PI); // バー/発光の基準

  let dragging = false, pointerId = null, lastX = 0, lastY = 0;
  let angVel = [0, 0, 0];
  let carry = [0, 0, 0];
  const samples = [];
  const SAMPLE_WINDOW = 120;

  function rotateBy(dx, dy) {
    const dist = Math.hypot(dx, dy);
    if (dist < 1e-6) return null;
    const angle = dist * ROT_PER_PX;
    orientation = qNorm(qMul(qFromAxisAngle(dy, dx, 0, angle), orientation));
    const s = angle / dist;
    return [dy * s, dx * s, 0];
  }
  function getXY(e) { const rect = canvas.getBoundingClientRect(); return [e.clientX - rect.left, e.clientY - rect.top]; }

  canvas.addEventListener("pointerdown", (e) => {
    if (pointerId !== null) return;
    pointerId = e.pointerId; dragging = true;
    canvas.classList.add("grabbing"); canvas.setPointerCapture(pointerId);
    const [x, y] = getXY(e); lastX = x; lastY = y;
    carry = angVel.slice();      // 現在の勢いを保持（加速の種）
    angVel = [0, 0, 0];          // ドラッグ中は1:1追従
    samples.length = 0;
    e.preventDefault();
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!dragging || e.pointerId !== pointerId) return;
    const [x, y] = getXY(e);
    const dx = x - lastX, dy = y - lastY; lastX = x; lastY = y;
    const rv = rotateBy(dx, dy);
    if (rv) { samples.push({ vx: rv[0], vy: rv[1], vz: rv[2], t: performance.now() }); if (samples.length > 8) samples.shift(); }
    e.preventDefault();
  });
  function endDrag(e) {
    if (e.pointerId !== pointerId) return;
    dragging = false; canvas.classList.remove("grabbing");
    try { canvas.releasePointerCapture(pointerId); } catch (_) {}
    pointerId = null;
    const now = performance.now();
    let sx=0, sy=0, sz=0, cnt=0;
    for (const s of samples) if (now - s.t <= SAMPLE_WINDOW) { sx+=s.vx; sy+=s.vy; sz+=s.vz; cnt++; }
    const fx = cnt ? sx/cnt : 0, fy = cnt ? sy/cnt : 0, fz = cnt ? sz/cnt : 0;
    const flingMag = Math.hypot(fx, fy, fz);
    if (flingMag < FLICK_MIN) {
      // 指を止めたまま離した → 掴んで止めたとみなし、元の回転を再開しない
      angVel = [0, 0, 0];
    } else {
      // フリックあり → 既存の勢い(carry)に加算（同方向なら加速、逆方向なら減速）
      let nx = carry[0]*CARRY + fx, ny = carry[1]*CARRY + fy, nz = carry[2]*CARRY + fz;
      const mag = Math.hypot(nx, ny, nz);
      if (mag > MAX_SPEED) { const k = MAX_SPEED / mag; nx*=k; ny*=k; nz*=k; }
      angVel = [nx, ny, nz];
    }
    samples.length = 0;
  }
  canvas.addEventListener("pointerup", endDrag);
  canvas.addEventListener("pointercancel", endDrag);

  // ==========================================================
  // ループ / 速度表示 / 発光量
  // ==========================================================
  let lastT = performance.now();
  let displayRPM = 0;

  function frame(now) {
    const dt = Math.min(now - lastT, 100); lastT = now;
    if (!dragging) {
      const speed = Math.hypot(angVel[0], angVel[1], angVel[2]);
      if (speed > STOP_THRESHOLD) {
        const frames = dt / (1000 / 60);
        const angle = speed * frames;
        orientation = qNorm(qMul(qFromAxisAngle(angVel[0], angVel[1], angVel[2], angle), orientation));
        const decay = Math.pow(FRICTION, frames);
        angVel[0]*=decay; angVel[1]*=decay; angVel[2]*=decay;
      } else { angVel[0]=0; angVel[1]=0; angVel[2]=0; }
    }

    const curSpeed = Math.hypot(angVel[0], angVel[1], angVel[2]);
    const rpm = (curSpeed * 60) / (2*Math.PI) * 60;
    displayRPM = displayRPM * 0.8 + rpm * 0.2;
    // 発光量（速度を正規化、早めに立ち上がるようカーブ）
    glow = Math.min(1, Math.pow((curSpeed / MAX_SPEED), 0.7));

    rpmEl.innerHTML = Math.round(displayRPM) + '<small>RPM</small>';
    rpmEl.style.textShadow = "0 0 " + (10 + 22*glow).toFixed(0) + "px rgba(130,190,255," + (0.4 + 0.5*glow).toFixed(2) + ")";
    barEl.style.width = Math.min(100, displayRPM / MAX_RPM * 100).toFixed(1) + "%";
    barEl.style.boxShadow = glow > 0.05 ? "0 0 " + (6+14*glow).toFixed(0) + "px rgba(120,200,255,0.9)" : "none";

    renderGlobe();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  angVel = [0.001, 0.006, 0];  // 初期のゆっくり自転
})();
</script>
</body>
</html>
